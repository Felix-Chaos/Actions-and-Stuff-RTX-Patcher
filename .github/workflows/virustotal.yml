name: VirusTotal Scan

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release Tag to scan (e.g., V2.1.6)'
        required: true
        type: string

jobs:
  virustotal-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to update the release body

    steps:
      - name: Find .exe asset in release
        id: find_exe
        uses: actions/github-script@v7
        with:
          script: |
            let release;
            if (context.eventName === 'workflow_dispatch') {
              const searchTag = context.payload.inputs.release_tag.toLowerCase();
              const { data: allReleases } = await github.rest.repos.listReleases({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 50,
              });
              
              const found = allReleases.find(r => (r.tag_name || '').toLowerCase() === searchTag);
              if (!found) {
                core.setFailed(`Could not find a release (even draft) with tag: ${context.payload.inputs.release_tag}`);
                return;
              }
              release = found;
            } else {
              release = context.payload.release;
            }

            const assets = await github.rest.repos.listReleaseAssets({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
            });
            const exe = assets.data.find(a => a.name.endsWith('.exe'));
            if (!exe) core.setFailed('No .exe asset found in this release.');
            core.setOutput('asset_url', exe.browser_download_url);
            core.setOutput('asset_name', exe.name);
            core.setOutput('release_id', String(release.id));
            core.setOutput('release_body', release.body || '');
            core.setOutput('release_tag', release.tag_name);

      - name: Download .exe asset
        run: |
          curl -L "${{ steps.find_exe.outputs.asset_url }}" -o release.exe

      - name: Upload to VirusTotal
        id: vt_upload
        run: |
          # 1. Get special upload URL for large files (>32MB)
          UPLOAD_URL=$(curl --silent --request GET \
            --url "https://www.virustotal.com/api/v3/files/upload_url" \
            --header "x-apikey: ${{ secrets.VIRUSTOTAL_API_KEY }}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('data', ''))")
          
          if [ -z "$UPLOAD_URL" ]; then
            echo "Failed to get upload URL. Falling back to default endpoint."
            UPLOAD_URL="https://www.virustotal.com/api/v3/files"
          fi

          # 2. Upload file
          RESPONSE=$(curl --silent --request POST \
            --url "$UPLOAD_URL" \
            --header "x-apikey: ${{ secrets.VIRUSTOTAL_API_KEY }}" \
            --form "file=@release.exe")
          
          echo "$RESPONSE"
          ANALYSIS_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('data', {}).get('id', ''))")
          
          if [ -z "$ANALYSIS_ID" ]; then
            echo "Failed to upload file. See response above."
            exit 1
          fi
          
          echo "analysis_id=$ANALYSIS_ID" >> $GITHUB_OUTPUT

      - name: Wait for analysis to complete
        run: sleep 45

      - name: Get analysis result and build permalink
        id: vt_result
        run: |
          ANALYSIS_ID="${{ steps.vt_upload.outputs.analysis_id }}"
          RESPONSE=$(curl --silent --request GET \
            --url "https://www.virustotal.com/api/v3/analyses/${ANALYSIS_ID}" \
            --header "x-apikey: ${{ secrets.VIRUSTOTAL_API_KEY }}")
          echo "$RESPONSE"

          SHA256=$(echo "$RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          sha = d.get('meta', {}).get('file_info', {}).get('sha256', '')
          if not sha:
              # fallback: parse from analysis ID (format: file-<sha256>-<timestamp>)
              parts = '$ANALYSIS_ID'.split('-')
              sha = parts[1] if len(parts) > 1 else ''
          print(sha)
          ")

          PERMALINK="https://www.virustotal.com/gui/file/${SHA256}"
          echo "permalink=$PERMALINK" >> $GITHUB_OUTPUT
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT

      - name: Append VirusTotal result to release body
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ steps.find_exe.outputs.release_id }}
          EXISTING_BODY: ${{ steps.find_exe.outputs.release_body }}
          RELEASE_TAG: ${{ steps.find_exe.outputs.release_tag }}
          VT_LINK: ${{ steps.vt_result.outputs.permalink }}
          SHA256: ${{ steps.vt_result.outputs.sha256 }}
          ASSET_NAME: ${{ steps.find_exe.outputs.asset_name }}
        with:
          script: |
            const releaseId = parseInt(process.env.RELEASE_ID);
            const existingBody = process.env.EXISTING_BODY || "";
            const vtLink = process.env.VT_LINK;
            const sha256 = process.env.SHA256;
            const assetName = process.env.ASSET_NAME;
            const tag = process.env.RELEASE_TAG;

            const vtSection = '\n\n---\n\n### 🛡️ VirusTotal Scan\n| | |\n|---|---|\n' +
              '| **Release** | `' + tag + '` |\n' +
              '| **File** | `' + assetName + '` |\n' +
              '| **SHA256** | `' + sha256 + '` |\n' +
              '| **Scan Result** | [🔍 View on VirusTotal](' + vtLink + ') |\n';

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              body: existingBody + vtSection
            });

            console.log('VirusTotal link appended: ' + vtLink);
