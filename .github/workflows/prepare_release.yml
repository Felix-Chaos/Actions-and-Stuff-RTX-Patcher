name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'What does this release include?'
        required: true
        default: 'New Patch'
        type: choice
        options:
          - 'New Patch'
          - 'Patcher update'
          - 'Both'
      pack_version:
        description: 'A&S Pack Version (e.g. 1.10.1)'
        required: true
        default: '1.10.1'
        type: string
      patch_version:
        description: 'Patch Version (e.g. v1.0)'
        required: true
        default: 'v1.0'
        type: string
      prerelease:
        description: 'Release type'
        required: true
        default: 'stable'
        type: choice
        options:
          - stable
          - beta

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Read version from src/version.py
        id: get_version
        run: |
          VERSION=$(python3 -c "
          import re
          with open('A&S Patcher/src/version.py', 'r') as f:
              content = f.read()
          match = re.search(r'VERSION\s*=\s*[\"\']([\d.]+)[\"|\']', content)
          print(match.group(1) if match else 'unknown')
          ")
          BUILD_DATE=$(python3 -c "
          import re
          with open('A&S Patcher/src/version.py', 'r') as f:
              content = f.read()
          match = re.search(r'BUILD_DATE\s*=\s*[\"\'](.*?)[\"|\']', content)
          print(match.group(1) if match else 'unknown')
          ")

          IS_BETA="${{ github.event.inputs.prerelease }}"
          REL_TYPE="${{ github.event.inputs.release_type }}"
          PACK_VER="${{ github.event.inputs.pack_version }}"
          PATCH_VER="${{ github.event.inputs.patch_version }}"

          if [ "$REL_TYPE" = "Both" ]; then
            DISPLAY_TYPE="Patcher and Patch Update"
          else
            DISPLAY_TYPE="$REL_TYPE"
          fi

          if [ "$IS_BETA" = "beta" ]; then
            TAG="V${VERSION}b"
            TITLE="V${VERSION}b Release of: ${DISPLAY_TYPE} | A&S for RTX ${PACK_VER} | Patch ${PATCH_VER}"
            BADGE="🧪 **Beta Release** — may contain bugs. Please report issues on Discord!"
          else
            TAG="V${VERSION}"
            TITLE="V${VERSION} Release of: ${DISPLAY_TYPE} | A&S for RTX ${PACK_VER} | Patch ${PATCH_VER}"
            BADGE="✅ **Stable Release**"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_date=$BUILD_DATE" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "badge=$BADGE" >> $GITHUB_OUTPUT

      - name: Generate release body
        id: body
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          BUILD_DATE="${{ steps.get_version.outputs.build_date }}"
          TAG="${{ steps.get_version.outputs.tag }}"
          BADGE="${{ steps.get_version.outputs.badge }}"

          cat > release_body.md << EOF
          ## A&S Minecraft RTX Community Patcher — ${TAG}

          ${BADGE}

          > Built on: \`${BUILD_DATE}\`

          ---

          ### ✨ What's New
          <!-- Fill in your changelog here before publishing -->
          - 

          ### 🐛 Bug Fixes
          <!-- List bug fixes here -->
          - 

          ### 👥 Contributors
          @Javier6003 (error90099900)
          Felix-Chaos

          ### 📦 Installation
          1. Download \`AnS_RTX_Patcher_V2.exe\` below
          2. Make sure [BetterRTX](https://bedrock.graphics/) is installed
          3. Run the patcher and follow the on-screen instructions

          > [!NOTE]
          > The patcher does **not** include any original A&S assets — you need your own copy of Actions & Stuff.

          ---

          ### 🛡️ VirusTotal Scan
          *This section will be automatically filled in by the VirusTotal workflow after you upload the .exe asset and publish.*

          ---

          *Built with ❤️ by the A&S RTX Community · [Discord](https://discord.gg/YrMMmN2kc7)*
          EOF

      - name: Create Draft Release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('release_body.md', 'utf8');
            const isPre = '${{ github.event.inputs.prerelease }}' === 'beta';
            const tag = '${{ steps.get_version.outputs.tag }}';
            const title = '${{ steps.get_version.outputs.title }}';

            const result = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: title,
              body: body,
              draft: true,
              prerelease: isPre,
            });

            console.log(`✅ Draft release created: ${result.data.html_url}`);
            console.log(`📌 Version: ${tag}`);
            console.log('Next steps:');
            console.log('  1. Fill in the changelog in the draft');
            console.log('  2. Upload AnS_RTX_Patcher_V2.exe as an asset');
            console.log('  3. Publish the release → VirusTotal scan fires automatically');
